{% extends 'gym/base_admin.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title|upper }}{% endblock %}
{% block topbar_actions %}
<a href="{% url 'plan_list' %}" class="btn btn-outline btn-sm">← Back</a>
{% endblock %}

{% block content %}
<div style="max-width:520px">
<form method="post">
{% csrf_token %}
<div class="card">
  <div class="card-header">Plan Details</div>
  <div class="card-body">
    <div class="form-group">
      <label class="form-label">Plan Name *</label>
      <input type="text" name="name" value="{{ form.name.value|default:'' }}" class="form-control" placeholder="e.g. Monthly, Quarterly, Annual" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Duration (Months) *</label>
        <input type="number" name="duration_months" value="{{ form.duration_months.value|default:1 }}" class="form-control" min="1" required>
      </div>
      <div class="form-group">
        <label class="form-label">Price (₹) *</label>
        <input type="number" name="price" value="{{ form.price.value|default:'' }}" class="form-control" placeholder="1500" step="0.01" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="3" placeholder="What's included…">{{ form.description.value|default:'' }}</textarea>
    </div>
    <div class="form-group">
      <label style="display:flex; align-items:center; gap:10px; cursor:pointer">
        <input type="checkbox" name="is_active" {% if form.is_active.value %}checked{% endif %} style="width:auto; accent-color:var(--red)">
        <span class="form-label" style="margin:0">Active (visible when assigning to members)</span>
      </label>
    </div>
  </div>
</div>
<div style="display:flex; gap:12px; margin-top:20px">
  <button type="submit" class="btn btn-primary">Save Plan →</button>
  <a href="{% url 'plan_list' %}" class="btn btn-outline">Cancel</a>
</div>
</form>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — {{ gym.gym_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root { --red:#e8281e; --black:#080808; --dark:#111; --dark2:#181818; --dark3:#222; --border:rgba(255,255,255,0.07); --light-gray:#888; --white:#f5f0eb; }
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--black); color:var(--white); font-family:'Barlow',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(232,40,30,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(232,40,30,0.03) 1px,transparent 1px); background-size:80px 80px; pointer-events:none; }
.login-box { width:100%; max-width:400px; padding:20px; }
.logo { text-align:center; margin-bottom:40px; }
.logo-text { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:6px; }
.logo-text span { color:var(--red); }
.logo-sub { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:4px; color:var(--light-gray); text-transform:uppercase; margin-top:4px; }
.card { background:var(--dark2); border:1px solid var(--border); border-radius:10px; padding:36px; }
.card-title { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:4px; text-transform:uppercase; color:var(--light-gray); margin-bottom:28px; }
.form-group { margin-bottom:18px; }
label { display:block; font-family:'Barlow Condensed',sans-serif; font-size:0.65rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--light-gray); margin-bottom:8px; }
input { width:100%; background:var(--dark3); border:1px solid var(--border); color:var(--white); padding:12px 16px; border-radius:6px; font-family:'Barlow',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
input:focus { border-color:var(--red); }
.btn { width:100%; background:var(--red); color:var(--white); border:none; padding:14px; border-radius:6px; font-family:'Barlow Condensed',sans-serif; font-size:0.8rem; font-weight:700; letter-spacing:3px; text-transform:uppercase; cursor:pointer; margin-top:8px; transition:background 0.2s; }
.btn:hover { background:#a01810; }
.error { background:rgba(232,40,30,0.1); border:1px solid rgba(232,40,30,0.2); color:#f87171; padding:10px 14px; border-radius:6px; font-size:0.82rem; margin-bottom:16px; }
.back-link { text-align:center; margin-top:20px; }
.back-link a { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:2px; color:var(--light-gray); text-decoration:none; text-transform:uppercase; }
.back-link a:hover { color:var(--red); }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-text">{% if gym.gym_name %}{{ gym.gym_name|upper }}{% else %}<span>IRON</span>FORGE{% endif %}</div>
    <div class="logo-sub">Admin Panel</div>
  </div>
  <div class="card">
    <div class="card-title">Sign In to Continue</div>
    {% if messages %}{% for msg in messages %}<div class="error">{{ msg }}</div>{% endfor %}{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Enter Panel →</button>
    </form>
  </div>
  <div class="back-link"><a href="/">← Back to Website</a></div>
</div>
</body>
</html>

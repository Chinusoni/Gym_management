{% extends 'gym/base_admin.html' %}
{% block title %}Record Payment{% endblock %}
{% block page_title %}RECORD <span>PAYMENT</span>{% endblock %}
{% block topbar_actions %}
<a href="{% url 'payment_list' %}" class="btn btn-outline btn-sm">← Back</a>
{% endblock %}

{% block content %}
<div style="max-width:600px">
<form method="post">
{% csrf_token %}
<div class="card">
  <div class="card-header">Payment Details</div>
  <div class="card-body">
    <div class="form-group">
      <label class="form-label">Member *</label>
      <select name="member" class="form-control" required>
        <option value="">— Select Member —</option>
        {% for m in form.member.field.queryset %}
        <option value="{{ m.pk }}" {% if form.member.value|stringformat:'s' == m.pk|stringformat:'s' %}selected{% endif %}>
          {{ m.full_name }} — {{ m.phone }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Plan (Optional)</label>
        <select name="plan" class="form-control">
          <option value="">— No Plan —</option>
          {% for p in form.plan.field.queryset %}
          <option value="{{ p.pk }}" {% if form.plan.value|stringformat:'s' == p.pk|stringformat:'s' %}selected{% endif %}>
            {{ p.name }} — ₹{{ p.price }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Amount (₹) *</label>
        <input type="number" name="amount" value="{{ form.amount.value|default:'' }}" class="form-control" placeholder="1500" step="0.01" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Payment Date</label>
        <input type="date" name="payment_date" value="{{ form.payment_date.value|default:'' }}" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select name="status" class="form-control">
          <option value="paid" {% if form.status.value == 'paid' %}selected{% endif %}>Paid</option>
          <option value="pending" {% if form.status.value == 'pending' %}selected{% endif %}>Pending</option>
          <option value="overdue" {% if form.status.value == 'overdue' %}selected{% endif %}>Overdue</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <input type="text" name="notes" value="{{ form.notes.value|default:'' }}" class="form-control" placeholder="Cash payment, UPI, etc.">
    </div>
  </div>
</div>
<div style="display:flex; gap:12px; margin-top:20px">
  <button type="submit" class="btn btn-primary">Save Payment →</button>
  <a href="{% url 'payment_list' %}" class="btn btn-outline">Cancel</a>
</div>
</form>
</div>
{% endblock %}
